  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background-color: #060B18;
      color: #E8ECF4;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    ::selection {
      background: rgba(201, 168, 76, 0.25);
      color: #DFC06A;
    }

    /* ZEN noise overlay for subtle grain and depth */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* ZEN quantum aurora static backdrop */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 85% 80%, rgba(34, 211, 238, 0.05) 0%, transparent 55%),
        radial-gradient(ellipse 90% 70% at 50% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 60%),
        linear-gradient(180deg, #060B18 0%, #0A1628 30%, #0C1A30 60%, #060B18 100%);
    }

    /* ZEN Grid Pattern — subtle structural overlay */
    .aurora-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 168, 76, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 168, 76, 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Premium glass card base */
    .glass-card {
      background: linear-gradient(145deg, rgba(17, 24, 39, 0.85), rgba(15, 23, 42, 0.65), rgba(6, 11, 24, 0.7));
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-radius: 1.25rem;
      border: 1px solid rgba(201, 168, 76, 0.12);
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 2px 4px -1px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(201, 168, 76, 0.06),
        inset 0 0 20px rgba(201, 168, 76, 0.02);
    }

    /* ZEN scrollbar */
    .liquid-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .liquid-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .liquid-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(201, 168, 76, 0.2);
      border-radius: 20px;
      transition: background 0.3s ease;
    }

    .liquid-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(201, 168, 76, 0.4);
    }

    *:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.4), 0 0 12px rgba(201, 168, 76, 0.1);
    }
  </style>
</head>

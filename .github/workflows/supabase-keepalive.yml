name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 4 days at 12:00 UTC (well within the 7-day pause window)
    - cron: '0 12 */4 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    name: Ping Supabase to prevent pause
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST health endpoint
        env:
          SUPABASE_URL: https://csmuunvhcekcamuccsnn.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_pb9OZgtWXijMZy-kdoiZrQ_HXalYKSC
        run: |
          echo "Pinging Supabase project csmuunvhcekcamuccsnn..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ Supabase project is alive (HTTP $STATUS)"
          else
            echo "⚠️ Unexpected status: $STATUS"
            exit 1
          fi
